<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" font-family="ui-sans-serif,system-ui,Arial,sans-serif">

  <defs>
    <marker id="arrD" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#94A3B8"/></marker>
    <marker id="arrAmber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#D97706"/></marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="620" fill="#F8FAFC"/>

  <!-- HEADER -->
  <rect width="800" height="66" fill="#0F172A"/>
  <rect y="63" width="800" height="3" fill="#6366F1"/>
  <text x="28" y="36" font-size="19" font-weight="700" fill="#F1F5F9">End-to-End Architecture</text>
  <text x="28" y="55" font-size="12" fill="#F1F5F9">From staff request to standardized verification document · autonomous · self-improving via HITL</text>

  <!-- ─────────────────────────────────────────────
       STEP 1: Staff Request  (y=82-116, full width)
  ───────────────────────────────────────────── -->
  <rect x="16" y="82" width="768" height="34" rx="6" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="400" y="95" text-anchor="middle" font-size="9" font-weight="600" fill="#94A3B8" letter-spacing="1">TRIGGER</text>
  <text x="400" y="109" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Staff (or scheduler) submits: patient name · date of birth · insurance carrier · procedure codes</text>

  <line x1="400" y1="116" x2="400" y2="130" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrD)"/>

  <!-- ─────────────────────────────────────────────
       STEP 2: Login Agent + XHR  (y=132-194, full)
  ───────────────────────────────────────────── -->
  <!-- Login Agent (x=16, w=368) -->
  <rect x="16" y="132" width="368" height="62" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="28" y="150" font-size="9" font-weight="600" fill="#94A3B8" letter-spacing="1">PYTHON · DEEPAGENTS · PLAYWRIGHT</text>
  <text x="28" y="167" font-size="13" font-weight="700" fill="#1E40AF">Login Agent</text>
  <text x="28" y="183" font-size="10" fill="#64748B">Autonomous browser automation — navigates any carrier portal login flow</text>

  <!-- → Arrow (login → portal) -->
  <line x1="388" y1="163" x2="396" y2="163" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrD)"/>

  <!-- Portal + XHR (x=400, w=384) -->
  <rect x="400" y="132" width="384" height="62" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="414" y="150" font-size="9" font-weight="600" fill="#94A3B8" letter-spacing="1">CARRIER PORTAL → XHR INTERCEPTION</text>
  <text x="414" y="167" font-size="13" font-weight="700" fill="#15803D">Raw API Response Capture</text>
  <text x="414" y="183" font-size="10" fill="#64748B">Reads the portal's own structured JSON — not scraped DOM, not PDF OCR</text>

  <line x1="400" y1="194" x2="400" y2="208" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrD)"/>

  <!-- ─────────────────────────────────────────────
       STEP 3: Data Pipeline  (y=210-250, full)
  ───────────────────────────────────────────── -->
  <rect x="16" y="210" width="768" height="40" rx="8" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="400" y="223" text-anchor="middle" font-size="9" font-weight="600" fill="#94A3B8" letter-spacing="1">DETERMINISTIC PREPROCESSING</text>
  <text x="116" y="241" font-size="11" font-weight="700" fill="#6D28D9">PreParser</text>
  <text x="185" y="241" font-size="11" fill="#94A3B8">→ JSON to Markdown →</text>
  <text x="296" y="241" font-size="11" font-weight="700" fill="#6D28D9">Chunker</text>
  <text x="348" y="241" font-size="11" fill="#94A3B8">→ token splits →</text>
  <text x="443" y="241" font-size="11" font-weight="700" fill="#6D28D9">Embedder</text>
  <text x="507" y="241" font-size="11" fill="#94A3B8">→ vectors →</text>
  <text x="576" y="241" font-size="11" font-weight="700" fill="#6D28D9">PostgreSQL pgvector</text>

  <line x1="400" y1="250" x2="400" y2="264" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrD)"/>

  <!-- ─────────────────────────────────────────────
       STEP 4: LangGraph Supervisor + 7 LLM Agents
       (y=266-448, x=16, w=524  |  HITL: x=552, w=232)
  ───────────────────────────────────────────── -->

  <!-- LangGraph box (x=16, w=524) -->
  <rect x="16" y="266" width="524" height="182" rx="8" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
  <rect x="16" y="266" width="524" height="28" rx="8" fill="#6366F1"/>
  <rect x="16" y="280" width="524" height="14" fill="#6366F1"/>
  <text x="278" y="284" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">LangGraph Supervisor · TypeScript</text>

  <text x="36" y="308" font-size="9" font-weight="600" fill="#6366F1" letter-spacing="1">BATCH 1 · 2 LLM AGENTS RUNNING IN PARALLEL</text>

  <!-- Batch 1 nodes (y=316-346, h=30, w=236, gap=12) -->
  <rect x="36" y="316" width="236" height="30" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="90" y="328" font-size="10" font-weight="700" fill="#1E40AF">Patient Info</text>
  <rect x="90" y="328" width="0" height="0"/>
  <text x="90" y="341" font-size="9" fill="#3B82F6">ReAct LLM agent · queries pgvector chunks</text>
  <rect x="266" y="316" width="236" height="30" rx="6" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
  <text x="320" y="328" font-size="10" font-weight="700" fill="#5B21B6">Insurance Info</text>
  <text x="320" y="341" font-size="9" fill="#7C3AED">ReAct LLM agent · queries pgvector chunks</text>

  <!-- LLM badges for batch 1 -->
  <rect x="214" y="318" width="28" height="12" rx="3" fill="#1E40AF"/>
  <text x="228" y="328" text-anchor="middle" font-size="8" font-weight="700" fill="#FFFFFF">LLM</text>
  <rect x="444" y="318" width="28" height="12" rx="3" fill="#5B21B6"/>
  <text x="458" y="328" text-anchor="middle" font-size="8" font-weight="700" fill="#FFFFFF">LLM</text>

  <text x="36" y="360" font-size="9" font-weight="600" fill="#6366F1" letter-spacing="1">BATCH 2 · 5 LLM AGENTS RUNNING IN PARALLEL</text>

  <!-- Batch 2 nodes (y=368-398, h=30, 5 nodes at w=90, gap=8) -->
  <!-- Coverage -->
  <rect x="36" y="368" width="90" height="30" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="81" y="381" text-anchor="middle" font-size="9" font-weight="700" fill="#15803D">Coverage</text>
  <rect x="90" y="370" width="26" height="10" rx="3" fill="#15803D"/>
  <text x="103" y="378" text-anchor="middle" font-size="7" font-weight="700" fill="#fff">LLM</text>
  <text x="81" y="393" text-anchor="middle" font-size="8" fill="#16A34A">Benefits %</text>

  <!-- Ortho -->
  <rect x="134" y="368" width="90" height="30" rx="6" fill="#CCFBF1" stroke="#5EEAD4" stroke-width="1"/>
  <text x="179" y="381" text-anchor="middle" font-size="9" font-weight="700" fill="#0F766E">Ortho</text>
  <rect x="188" y="370" width="26" height="10" rx="3" fill="#0F766E"/>
  <text x="201" y="378" text-anchor="middle" font-size="7" font-weight="700" fill="#fff">LLM</text>
  <text x="179" y="393" text-anchor="middle" font-size="8" fill="#0F766E">Ortho benefits</text>

  <!-- Waiting -->
  <rect x="232" y="368" width="90" height="30" rx="6" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="277" y="381" text-anchor="middle" font-size="9" font-weight="700" fill="#92400E">Waiting</text>
  <rect x="284" y="370" width="26" height="10" rx="3" fill="#92400E"/>
  <text x="297" y="378" text-anchor="middle" font-size="7" font-weight="700" fill="#fff">LLM</text>
  <text x="277" y="393" text-anchor="middle" font-size="8" fill="#92400E">Waiting periods</text>

  <!-- Procedures -->
  <rect x="330" y="368" width="90" height="30" rx="6" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="375" y="381" text-anchor="middle" font-size="9" font-weight="700" fill="#991B1B">Procedures</text>
  <rect x="382" y="370" width="26" height="10" rx="3" fill="#991B1B"/>
  <text x="395" y="378" text-anchor="middle" font-size="7" font-weight="700" fill="#fff">LLM</text>
  <text x="375" y="393" text-anchor="middle" font-size="8" fill="#991B1B">Dental codes</text>

  <!-- History -->
  <rect x="428" y="368" width="90" height="30" rx="6" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="473" y="381" text-anchor="middle" font-size="9" font-weight="700" fill="#6D28D9">History</text>
  <rect x="479" y="370" width="26" height="10" rx="3" fill="#6D28D9"/>
  <text x="492" y="378" text-anchor="middle" font-size="7" font-weight="700" fill="#fff">LLM</text>
  <text x="473" y="393" text-anchor="middle" font-size="8" fill="#6D28D9">Past procedures</text>

  <!-- Aggregator bar -->
  <rect x="36" y="406" width="488" height="28" rx="6" fill="#312E81"/>
  <text x="280" y="424" text-anchor="middle" font-size="10" font-weight="700" fill="#E0E7FF">All 7 nodes complete → merge outputs → QA validation → build StandardVerificationData</text>

  <!-- Arrow from LangGraph down -->
  <line x1="278" y1="448" x2="278" y2="464" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrD)"/>

  <!-- ─────────────────────────────────────────────
       STEP 5: QA + Form Generation  (y=466-510, x=16, w=524)
  ───────────────────────────────────────────── -->
  <rect x="16" y="466" width="524" height="42" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="278" y="481" text-anchor="middle" font-size="9" font-weight="600" fill="#94A3B8" letter-spacing="1">QA VALIDATION + FORM GENERATION</text>
  <text x="278" y="499" text-anchor="middle" font-size="11" fill="#374151">Cross-field consistency checks · confidence scoring · HTML + JSON + summary generated</text>

  <line x1="278" y1="508" x2="278" y2="522" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrD)"/>

  <!-- ─────────────────────────────────────────────
       STEP 6: Output  (y=524-562, x=16, w=524)
  ───────────────────────────────────────────── -->
  <rect x="16" y="524" width="524" height="38" rx="8" fill="#0F172A" stroke="#334155" stroke-width="1.5"/>
  <text x="278" y="539" text-anchor="middle" font-size="9" font-weight="600" fill="#64748B" letter-spacing="1">OUTPUT</text>
  <text x="278" y="554" text-anchor="middle" font-size="11" font-weight="700" fill="#E2E8F0">StandardVerificationData · QA-scored · delivered to web UI before appointment</text>

  <!-- Dashed arrow: Output → Label Studio (HITL column) -->
  <line x1="540" y1="543" x2="550" y2="543" stroke="#D97706" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrAmber)"/>

  <!-- ─────────────────────────────────────────────
       HITL FEEDBACK COLUMN  (x=552, y=266-562, w=232)
  ───────────────────────────────────────────── -->
  <rect x="552" y="266" width="232" height="296" rx="8" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- HITL header -->
  <rect x="552" y="266" width="232" height="26" rx="8" fill="#F59E0B"/>
  <rect x="552" y="280" width="232" height="12" fill="#F59E0B"/>
  <text x="668" y="283" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">HITL Feedback Loop</text>

  <!-- Label Studio box (y=300-380) -->
  <rect x="566" y="300" width="204" height="78" rx="6" fill="#FFFFFF" stroke="#FCD34D" stroke-width="1"/>
  <text x="668" y="318" text-anchor="middle" font-size="10" font-weight="700" fill="#92400E">Label Studio Review</text>
  <text x="668" y="334" text-anchor="middle" font-size="9" fill="#64748B">Staff reviews extracted fields</text>
  <text x="668" y="348" text-anchor="middle" font-size="9" fill="#64748B">Corrects wrong values</text>
  <text x="668" y="362" text-anchor="middle" font-size="9" fill="#64748B">Adds reasoning per field</text>
  <text x="668" y="376" text-anchor="middle" font-size="8" fill="#94A3B8">triggered by low QA confidence score</text>

  <!-- Arrow down inside HITL -->
  <line x1="668" y1="378" x2="668" y2="394" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrAmber)"/>

  <!-- pgvector Corrections box (y=394-480) -->
  <rect x="566" y="394" width="204" height="74" rx="6" fill="#FFFFFF" stroke="#FCD34D" stroke-width="1"/>
  <text x="668" y="412" text-anchor="middle" font-size="10" font-weight="700" fill="#92400E">pgvector Corrections</text>
  <text x="668" y="428" text-anchor="middle" font-size="9" fill="#64748B">Correction embedded via Ollama</text>
  <text x="668" y="443" text-anchor="middle" font-size="9" fill="#64748B">Stored in PostgreSQL + pgvector</text>
  <text x="668" y="458" text-anchor="middle" font-size="9" fill="#64748B">Indexed by mapper · carrier · field</text>

  <!-- Feedback arrow from pgvector LEFT into LangGraph agents -->
  <path d="M 566,431 L 542,431 L 542,390" stroke="#D97706" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrAmber)"/>
  <text x="543" y="425" font-size="8" fill="#92400E" transform="rotate(-90,543,425)">retrieved in LLM prompt</text>

  <!-- "Next Run" note at bottom of HITL -->
  <rect x="566" y="488" width="204" height="56" rx="6" fill="#FEF3C7"/>
  <text x="668" y="504" text-anchor="middle" font-size="9" font-weight="700" fill="#92400E">On Every Subsequent Run</text>
  <text x="668" y="519" text-anchor="middle" font-size="9" fill="#64748B">Each mapper queries corrections:</text>
  <text x="668" y="533" text-anchor="middle" font-size="8" fill="#374151">"LEARN FROM PAST CORRECTIONS"</text>
  <text x="668" y="546" text-anchor="middle" font-size="8" fill="#64748B">injected into the LLM system prompt</text>

  <!-- FOOTER -->
  <rect y="582" width="800" height="38" fill="#F1F5F9"/>
  <text x="400" y="605" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Python · TypeScript · LangGraph · DeepAgents · Playwright · PostgreSQL + pgvector · Label Studio · Next.js · Docker</text>

</svg>
